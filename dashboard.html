<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operações – Coamo</title>
  <link rel="stylesheet" href="style.css">
  <style>

      header, .tabs, .btn-exportar, .btn-block, .btn-logout,
      .rotina-actions select, .rotina-actions button,
      input, textarea, select { display: none !important; }

      .tab-content { display: none !important; }
      .tab-content.active { display: block !important; padding: 0 !important; }
      .rotina-item {
        border: 1px solid #ddd; margin-bottom: 5px; padding: 6px 8px;

      }
      .rotina-item.erro  { border-left-color: #cf222e !important; background: #fff5f5 !important; }

      .corvu-table td, .corvu-table th { border: 1px solid #ccc; padding: 4px 6px; }

      .aviso-corvu-mensal { background: #fff8e1 !important; color: #7a4f00; border-color: #f0c040; }
      .erro-msg-view { color: #cf222e !important; }
      .print-value {
        display: inline !important; font-size: 0.82rem;
        font-weight: 600; padding: 0 2px;
      }
      .hora-row { display: flex !important; gap: 8px; margin-top: 4px; }
      .hora-label { color: #555; font-size: 0.75rem; }
      /* Campos de texto nos campos extras */
      .rotina-campos-wrap, .campo-label-wrap, .campo-label { display: flex !important; }
    }

    /* Ocultar linhas PDF fora do print */
    .pdf-rotina-linha { display: none; }
    /* Chamado exibido apos encerrar */
    .chamado-encerrado {
      font-size: 0.82rem; font-weight: 600; color: #1a7f37;
      margin-top: 4px; padding: 2px 4px;
      background: #e6f4ea; border-radius: 4px; display: inline-block;
    }
  </style>
</head>
<body>
<header>
  <h1>⚙️ Sistema de Operações – Coamo</h1>
  <div class="header-right">
    <span id="relogioHeader"></span>
    <span class="user-badge" id="userBadge"></span>
    <button class="btn-exportar" onclick="exportarPDF()" title="Exportar PDF">🖨️ Exportar PDF</button>
    <button class="btn-sincronizar" id="btnSincronizar" onclick="sincronizarDados()" title="Sincronizar dados locais para o servidor" style="display:none">☁️ Sincronizar</button>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<div class="tabs" id="tabBar"></div>

<div id="tab-diario"      class="tab-content active"></div>
<div id="tab-corvudiario" class="tab-content"></div>
<div id="tab-fds"         class="tab-content"></div>
<div id="tab-mensal"      class="tab-content"></div>
<div id="tab-corvumensal" class="tab-content"></div>
<div id="tab-anual"       class="tab-content"></div>

<script src="data.js"></script>
<script>
// ── AUTH ─────────────────────────────────────────────────────────────
const user  = sessionStorage.getItem('user');
const role  = sessionStorage.getItem('role');
const token = sessionStorage.getItem('token');
if (!user || !token || !['operador','admin'].includes(role)) {
  sessionStorage.clear(); window.location.href = 'index.html';
}
document.getElementById('userBadge').textContent = '👤 ' + user + ' (' + role + ')';
function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

// ── SINCRONIZAÇÃO localStorage → Redis ───────────────────────────────
// Copia todos os dados do localStorage para o servidor (migração única)
async function sincronizarDados() {
  const btn = document.getElementById('btnSincronizar');
  btn.disabled = true;
  btn.textContent = '⏳ Sincronizando...';

  // Coleta todos os dados relevantes do localStorage
  const dados = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && (k.startsWith('status_') || k.startsWith('blocked_') ||
              k.startsWith('corvu_') || k.startsWith('horarios_'))) {
      dados[k] = localStorage.getItem(k);
    }
  }

  const qtd = Object.keys(dados).length;
  if (qtd === 0) {
    btn.textContent = '✓ Nada a sincronizar';
    setTimeout(() => { btn.textContent = '☁️ Sincronizar'; btn.disabled = false; }, 2000);
    return;
  }

  try {
    const r = await fetch('/api/migrar', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(dados)
    });
    const data = await r.json();
    if (r.ok) {
      btn.textContent = `✓ ${data.chaves} chaves sincronizadas!`;
      btn.style.background = 'rgba(63,185,80,0.2)';
      btn.style.color = '#3fb950';
      btn.style.borderColor = 'rgba(63,185,80,0.4)';
      setTimeout(() => {
        btn.textContent = '☁️ Sincronizar';
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
        btn.disabled = false;
      }, 3000);
    } else {
      btn.textContent = '✖ Erro: ' + (data.erro || 'falha');
      btn.disabled = false;
    }
  } catch {
    btn.textContent = '✖ Sem conexão';
    btn.disabled = false;
  }
}

// Mostra botão de sincronizar só para admin e quando há dados no localStorage
function verificarBtnSincronizar() {
  if (role !== 'admin') return;
  const temDados = Array.from({length: localStorage.length}, (_,i) => localStorage.key(i))
    .some(k => k && (k.startsWith('status_') || k.startsWith('corvu_')));
  const btn = document.getElementById('btnSincronizar');
  if (btn) btn.style.display = temDados ? 'inline-block' : 'none';
}

// Cabeçalho de autenticação para todas as chamadas de API
function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

// ── PROTEÇÃO BÁSICA DE INSPEÇÃO ───────────────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12') { e.preventDefault(); return false; }
  if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
  if (e.ctrlKey && e.key.toUpperCase() === 'U') { e.preventDefault(); return false; }
});

// ── ABAS ──────────────────────────────────────────────────────────────
const TABS = [
  { id:'diario',      label:'📋 Diário'          },
  { id:'corvudiario', label:'🖥️ Corvu Diário'    },
  { id:'fds',         label:'📆 Final de Semana' },
  { id:'mensal',      label:'📅 Mensal'           },
  { id:'corvumensal', label:'🖥️ Corvu Mensal'    },
  { id:'anual',       label:'📆 Anual'            },
];
let abaAtiva = 'diario';

// ── ABAS DINÂMICAS DO DIA ANTERIOR ───────────────────────────────────
// Verifica se há rotinas ou corvus do dia anterior com status registrado
// e cria/remove abas dinâmicas conforme necessário

// Seções que pertencem ao dia anterior (madrugada executada após virar o dia)
const SECOES_DIA_ANTERIOR = new Set(['Após meia-noite','Após 03:00h','Acompanhamento BI']);

function getDiasAnterioresComPendentes() {
  const dias = [];
  let chave = diaAtual;

  // IDs das rotinas de madrugada (seções que pertencem ao dia anterior)
  const idsMadrugada = new Set(
    ROTINAS_DIARIA
      .filter(r => SECOES_DIA_ANTERIOR.has(r.secao))
      .map(r => r.id)
  );

  for (let i = 0; i < 3; i++) {
    chave = getDiaAnteriorKey(chave);
    const sRotinas = getStatus('diario', chave);
    const sCorvu = getCorvuDadosDia(chave);

    // Rotinas com qualquer status marcado (inclui encerradas/erro — para não sumir inicio/fim/chamado)
    const temRotinasComStatus = Object.values(sRotinas).some(v => v && v.status);

    // Rotinas de madrugada com status — SÓ para o dia imediatamente anterior (i===0)
    const temMadrugadaComStatus = i === 0 && [...idsMadrugada].some(id => {
      const v = sRotinas[id];
      return v && v.status; // qualquer status (executando, encerrado, erro)
    });

    // Corvu tem dados se alguma linha tem início registrado (bloqueadas inclusive — mantém histórico)
    const temCorvu = Object.values(sCorvu).some(v => v && v.inicio);

    if (temRotinasComStatus || temMadrugadaComStatus || temCorvu) {
      dias.push({ diaKey: chave, temRotinas: temRotinasComStatus || temMadrugadaComStatus, temCorvu });
    } else break;
  }
  return dias;
}

// Corvu diário agora salva por data para suportar dia anterior
function getCorvuDadosDia(diaKey) {
  const k = 'corvu_dados_corvu_' + (diaKey || diaAtual);
  try { return JSON.parse(lerChave(k) || '{}'); } catch { return {}; }
}
async function saveCorvuCampoDia(diaKey, idx, campo, val) {
  const k = 'corvu_dados_corvu_' + (diaKey || diaAtual);
  const d = getCorvuDadosDia(diaKey);
  if (!d[idx]) d[idx] = {};
  d[idx][campo] = val;
  await salvarChave(k, JSON.stringify(d));
  _cache[k] = JSON.stringify(d);
  atualizarIndicadorPendentes();
}

function garantirTabDinamica(diaKey) {
  // IDs usados: tab-diario-YYYY-MM-DD e tab-corvu-YYYY-MM-DD
  const idRotinas = 'tab-diario-' + diaKey;
  const idCorvu   = 'tab-corvu-'  + diaKey;
  if (!document.getElementById(idRotinas)) {
    const d1 = document.createElement('div');
    d1.id = idRotinas; d1.className = 'tab-content';
    document.body.appendChild(d1);
  }
  if (!document.getElementById(idCorvu)) {
    const d2 = document.createElement('div');
    d2.id = idCorvu; d2.className = 'tab-content';
    document.body.appendChild(d2);
  }
}

function renderTabBar() {
  const diasAnt = getDiasAnterioresComPendentes();

  // Garante que os divs das abas dinâmicas existam
  diasAnt.forEach(({ diaKey }) => garantirTabDinamica(diaKey));

  const [,m,d] = diaAtual.split('-');
  let html = '';

  // Abas do dia anterior (aparecem antes das abas do dia atual)
  diasAnt.forEach(({ diaKey }) => {
    const [,am,ad] = diaKey.split('-');
    const label = `${ad}/${am}`;
    const idR = 'tab-diario-' + diaKey;
    const idC = 'tab-corvu-'  + diaKey;
    html += `<button class="tab-btn tab-btn-anterior${abaAtiva===idR?' active':''}" onclick="abrirTab('${idR}')">⚠️ Diário ${label}</button>`;
    html += `<button class="tab-btn tab-btn-anterior${abaAtiva===idC?' active':''}" onclick="abrirTab('${idC}')">⚠️ Corvu ${label}</button>`;
  });

  // Abas fixas normais
  TABS.forEach(t => {
    html += `<button class="tab-btn${abaAtiva===t.id?' active':''}" onclick="abrirTab('${t.id}')">${t.label}</button>`;
  });
  html += `<button class="tab-btn" onclick="window.location.href='horarios.html'">🗓️ Horários</button>`;

  document.getElementById('tabBar').innerHTML = html;
}

function abrirTab(id) {
  abaAtiva = id;
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  // Abas dinâmicas já têm ID completo (tab-diario-YYYY-MM-DD)
  // Abas fixas têm ID sem prefixo (diario, mensal, etc.)
  const el = document.getElementById(id) || document.getElementById('tab-' + id);
  if (el) el.classList.add('active');
  renderTabBar(); renderAll();
}

// ── RENDER ALL ────────────────────────────────────────────────────────
function renderAll() {
  const a = abaAtiva;

  // Abas dinâmicas do dia anterior
  if (a.startsWith('tab-diario-')) {
    const dk = a.replace('tab-diario-', '');
    garantirTabDinamica(dk);
    // Passa só o sufixo para renderRotinas não duplicar o prefixo 'tab-'
    renderRotinas('diario-' + dk, ROTINAS_DIARIA, 'diario', dk);
    return;
  }
  if (a.startsWith('tab-corvu-')) {
    const dk = a.replace('tab-corvu-', '');
    garantirTabDinamica(dk);
    const tab = document.getElementById(a);
    if (tab) {
      const [,am,ad] = dk.split('-');
      tab.innerHTML = `<div class="movimento-header">${getMovimentoHeaderCorvu(dk)}</div><div id="corvu-inner-${dk}"></div>`;
      renderCorvuDia('corvu-inner-' + dk, ROTINAS_CORVU, dk);
    }
    return;
  }

  if(a==='diario')      renderRotinas('diario',      ROTINAS_DIARIA,       'diario',      diaAtual);
  if(a==='corvudiario') renderCorvu('corvudiario',   ROTINAS_CORVU,        'corvu');
  if(a==='fds')         renderRotinas('fds',         ROTINAS_FDS_NOVO,     'fds',         diaAtual);
  if(a==='mensal')      renderRotinas('mensal',      ROTINAS_MENSAL,       'mensal',      null);
  if(a==='corvumensal') renderCorvu('corvumensal',   ROTINAS_CORVU_MENSAL, 'corvumensal');
  if(a==='anual')       renderRotinas('anual',       ROTINAS_ANUAIS,       'anual',       null);
}

function exportarPDF() {
  const nomes = { diario:'Diaria', corvudiario:'Corvu_Diario', fds:'Final_de_Semana',
                  mensal:'Mensal', corvumensal:'Corvu_Mensal', anual:'Anual' };

  // Para abas dinâmicas do dia anterior, usa a data da aba, não diaAtual
  let dkPDF = diaAtual;
  if (abaAtiva.startsWith('tab-diario-')) dkPDF = abaAtiva.replace('tab-diario-', '');
  else if (abaAtiva.startsWith('tab-corvu-')) dkPDF = abaAtiva.replace('tab-corvu-', '');

  const [y,m,d] = dkPDF.split('-');
  const nomeAba = nomes[abaAtiva] || (abaAtiva.startsWith('tab-diario-') ? 'Diaria' : abaAtiva.startsWith('tab-corvu-') ? 'Corvu_Diario' : abaAtiva);
  const nomePDF = `${nomeAba}_${d}-${m}-${y}`;
  document.title = nomePDF;

  const tabAtiva = document.querySelector('.tab-content.active');
  const substituicoes = [];

  tabAtiva.querySelectorAll('input, textarea, select').forEach(el => {
    const span = document.createElement('span');
    span.className = 'print-value';
    if (el.tagName === 'SELECT') {
      const opt = el.options[el.selectedIndex];
      span.textContent = opt ? opt.text : '';
      if (el.value === 'executando') span.style.color = '#1a7f37';
      else if (el.value === 'encerrado') span.style.color = '#1a7f37';
      else if (el.value === 'erro') span.style.color = '#cf222e';
      else span.style.color = '#888';
    } else {
      span.textContent = el.value || '—';
    }
    el.parentNode.insertBefore(span, el);
    el.style.display = 'none';
    substituicoes.push({ el, span });
  });

  window.print();

  setTimeout(() => {
    substituicoes.forEach(({ el, span }) => {
      el.style.display = '';
      span.remove();
    });
    document.title = 'Operações – Coamo';
  }, 1500);
}

// ── DATA / HORA ───────────────────────────────────────────────────────
function getDiaKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDiaAnteriorKey(key) {
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y,m-1,d); dt.setDate(dt.getDate()-1);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function formatarDataKey(key) { const [y,m,d]=key.split('-'); return `${d}/${m}/${y}`; }
function getMovimentoHeader(diaKey) {
  const [y,m,d] = (diaKey || diaAtual).split('-');
  return `ROTINAS DO UNIFACE - MOVIMENTO DO DIA – ${d}/${m}/${y}`;
}
function getMovimentoHeaderCorvu(diaKey) {
  const [y,m,d] = (diaKey || diaAtual).split('-');
  return `ROTINAS DO CORVU - MOVIMENTO DO DIA – ${d}/${m}/${y}`;
}
function getMovimentoHeaderCorvuMensal(diaKey) {
  const [y,m,d] = (diaKey || diaAtual).split('-');
  return `CORVU – MENSAL – ${d}/${m}/${y}`;
}
function getMovimentoHeaderMensal(diaKey) {
  const [y,m,d] = (diaKey || diaAtual).split('-');
  return `UNIFACE MENSAL – ${d}/${m}/${y}`;
}
function getMovimentoHeaderAnual(diaKey) {
  const [y,m,d] = (diaKey || diaAtual).split('-');
  return `UNIFACE ANUAL – ${d}/${m}/${y}`;
}
function horaAtual() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function horaParaMin(h) { if(!h||!h.match(/^\d{2}:\d{2}/))return -1; const[hh,mm]=h.split(':'); return parseInt(hh)*60+parseInt(mm); }
let diaAtual = getDiaKey();

// ── STORAGE (API servidor + localStorage fallback) ────────────────────
// Sempre usa API (o site roda no servidor)
const USAR_API = location.protocol === 'http:' || location.protocol === 'https:';
const API_URL  = '/api/dados';

// Cache local dos dados (evita leituras repetidas)
let _cache = {};

// Timestamp da última modificação local por chave
// Impede que o polling sobrescreva dados que acabaram de ser editados localmente
const _localTimestamp = {};

// Carrega todos os dados do servidor na inicialização
async function carregarDadosServidor() {
  if (!USAR_API) return;
  try {
    const r = await fetch(API_URL, { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.status === 401) { sessionStorage.clear(); window.location.href = 'index.html'; return; }
    if (r.ok) {
      _cache = await r.json();
      Object.entries(_cache).forEach(([k,v]) => {
        try { localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v)); } catch {}
      });
    }
  } catch { /* servidor offline — usa localStorage */ }
}

// Fila de salvamentos pendentes para retry em caso de falha
const _filaSalvamento = {};

// Salva uma chave no servidor e no localStorage
async function salvarChave(chave, valor) {
  const valorStr = typeof valor === 'string' ? valor : JSON.stringify(valor);
  try { localStorage.setItem(chave, valorStr); } catch {}
  if (USAR_API) _cache[chave] = valorStr;
  // Marca o timestamp local — polling não pode sobrescrever por 10 segundos
  _localTimestamp[chave] = Date.now();
  if (!USAR_API) return;
  // Marca como pendente (será reenviado se falhar)
  _filaSalvamento[chave] = valorStr;
  try {
    const r = await fetch(`${API_URL}/${encodeURIComponent(chave)}`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ valor: valorStr })
    });
    if (r.ok) {
      delete _filaSalvamento[chave]; // removido da fila após sucesso
    }
  } catch { /* servidor offline — será reenviado pelo flushPendentes */ }
}

// Reenvia dados que não foram salvos no servidor (ex: conexão caiu)
async function flushPendentes() {
  const chaves = Object.keys(_filaSalvamento);
  for (const chave of chaves) {
    try {
      const r = await fetch(`${API_URL}/${encodeURIComponent(chave)}`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ valor: _filaSalvamento[chave] })
      });
      if (r.ok) delete _filaSalvamento[chave];
    } catch { break; } // servidor ainda offline, tenta na próxima
  }
}

// Lê uma chave (do cache/localStorage)
function lerChave(chave) {
  if (USAR_API && _cache[chave] !== undefined) {
    const v = _cache[chave];
    return typeof v === 'string' ? v : JSON.stringify(v);
  }
  return localStorage.getItem(chave);
}

// Indicador visual de pendentes
function atualizarIndicadorPendentes() {
  const qtd = Object.keys(_filaSalvamento).length;
  let el = document.getElementById('indicadorPendentes');
  if (!el) {
    el = document.createElement('span');
    el.id = 'indicadorPendentes';
    el.style.cssText = 'font-size:0.75rem;padding:2px 6px;border-radius:10px;margin-right:6px;display:none;';
    const badge = document.getElementById('userBadge');
    if (badge) badge.parentNode.insertBefore(el, badge);
  }
  if (qtd > 0) {
    el.style.display = 'inline';
    el.style.background = '#fff3cd';
    el.style.color = '#856404';
    el.textContent = '⏳ Salvando...';
  } else {
    el.style.display = 'none';
  }
}

// Polling: atualiza dados do servidor a cada 3 segundos (quando em modo web)
const PROTEGER_POR_MS = 15000; // ignora updates do servidor por 15s após edição local
function iniciarPolling() {
  if (!USAR_API) return;
  setInterval(async () => {
    // Tenta reenviar dados pendentes antes de buscar novos
    if (Object.keys(_filaSalvamento).length > 0) {
      await flushPendentes();
      atualizarIndicadorPendentes();
    }
    try {
      const r = await fetch(API_URL + '?t=' + Date.now(), {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (r.status === 401) { sessionStorage.clear(); window.location.href = 'index.html'; return; }
      if (r.ok) {
        const novos = await r.json();
        const agora = Date.now();
        let mudou = false;
        Object.entries(novos).forEach(([k,v]) => {
          const vStr = typeof v === 'string' ? v : JSON.stringify(v);
          // Não sobrescreve se:
          // 1) dado ainda está na fila de envio, OU
          // 2) foi editado localmente há menos de 15 segundos
          const editadoRecente = _localTimestamp[k] && (agora - _localTimestamp[k]) < PROTEGER_POR_MS;
          if (!_filaSalvamento[k] && !editadoRecente && _cache[k] !== vStr) {
            _cache[k] = vStr;
            mudou = true;
          }
        });
        if (mudou) atualizarSemPerderFoco();
      }
    } catch {}
  }, 3000);
}

// Atualiza a tela sem sobrescrever campos que o usuário está editando
function atualizarSemPerderFoco() {
  const focusado = document.activeElement;
  const tagAtiva = focusado ? focusado.tagName : '';

  // Se o usuário está digitando em algum input/textarea/select, não re-renderiza agora
  // O próximo ciclo de polling vai atualizar quando ele sair do campo
  if (tagAtiva === 'INPUT' || tagAtiva === 'TEXTAREA' || tagAtiva === 'SELECT') return;

  renderAll();
}

// ── Funções de storage que usam a camada unificada ────────────────────
function getStatusKey(p,dk) { return(p==='diario'||p==='fds')?'status_diaria_'+(dk||diaAtual):'status_'+p; }
function getStatus(p,dk)    { try{return JSON.parse(lerChave(getStatusKey(p,dk))||'{}')}catch{return{}} }
async function saveStatus(p,obj,dk){ const k=getStatusKey(p,dk); await salvarChave(k,JSON.stringify(obj)); _cache[k]=JSON.stringify(obj); atualizarIndicadorPendentes(); }
function getBlocked(p,dk)   { const k=(p==='diario'||p==='fds')?'blocked_diaria_'+(dk||diaAtual):'blocked_'+p; try{return JSON.parse(lerChave(k)||'[]')}catch{return[]} }
async function saveBlocked(p,arr,dk){ const k=(p==='diario'||p==='fds')?'blocked_diaria_'+(dk||diaAtual):'blocked_'+p; await salvarChave(k,JSON.stringify(arr)); _cache[k]=JSON.stringify(arr); atualizarIndicadorPendentes(); }
function getCorvuDados(p) {
  // Para o corvu diário, usa chave datada para suportar dia anterior
  if (p === 'corvu') {
    const k = 'corvu_dados_corvu_' + diaAtual;
    try { return JSON.parse(lerChave(k) || '{}'); } catch { return {}; }
  }
  try { return JSON.parse(lerChave('corvu_dados_'+p) || '{}'); } catch { return {}; }
}
async function saveCorvuCampo(p, idx, campo, val) {
  // Para o corvu diário, salva com chave datada
  const chave = p === 'corvu' ? 'corvu_dados_corvu_' + diaAtual : 'corvu_dados_' + p;
  const d = getCorvuDados(p);
  if (!d[idx]) d[idx] = {};
  d[idx][campo] = val;
  await salvarChave(chave, JSON.stringify(d));
  _cache[chave] = JSON.stringify(d);
  atualizarIndicadorPendentes();
}
function getCorvuBlocked(p) { try{return JSON.parse(lerChave('blocked_corvu_'+p)||'[]')}catch{return[]} }

// ── PERMISSÕES POR PERFIL ─────────────────────────────────────────────
// admin  → pode editar tudo (rotinas + horários)
// operador → pode editar rotinas (status, início, fim, campos)

// ── AÇÕES ─────────────────────────────────────────────────────────────
async function mudarStatus(p,id,val,dk) {
  const s=getStatus(p,dk); if(!s[id])s[id]={};
  s[id].status=val; if(val!=='erro')s[id].msg='';
  await saveStatus(p,s,dk); renderAll();
}
async function mudarCampo(p,id,campo,val,dk) {
  const s=getStatus(p,dk); if(!s[id])s[id]={}; s[id][campo]=val; await saveStatus(p,s,dk);
}

// Salva hora e re-renderiza (para refletir o estado done quando fim é preenchido)
async function mudarCampoHora(p,id,campo,val,dk) {
  const s=getStatus(p,dk); if(!s[id])s[id]={}; s[id][campo]=val; await saveStatus(p,s,dk); renderAll();
}

// TAB nos campos de hora: preenche com horário atual se campo estiver vazio
function _preencherHoraAtual(input) {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  input.value = hh + ':' + mm;
}
function _avancarFoco(input) {
  const inputs = [...document.querySelectorAll('input:not([disabled]),select:not([disabled]),textarea:not([disabled]),button:not([disabled])')];
  const idx = inputs.indexOf(input);
  if(idx >= 0 && idx < inputs.length - 1) inputs[idx+1].focus();
}

function autoHoraTab(event,input,p,id,campo,dk) {
  if(event.key !== 'Tab') return;
  if(input.value && input.value.trim() !== '') return; // já tem valor, não sobrescreve
  event.preventDefault();
  _preencherHoraAtual(input);
  mudarCampoHora(p,id,campo,input.value,dk);
  _avancarFoco(input);
}

function autoHoraTabCorvu(event,input,p,idx,campo) {
  if(event.key !== 'Tab') return;
  if(input.value && input.value.trim() !== '') return;
  event.preventDefault();
  _preencherHoraAtual(input);
  saveCorvuCampo(p,idx,campo,input.value);
  _avancarFoco(input);
}

function autoHoraTabCorvuDia(event,input,diaKey,idx,campo) {
  if(event.key !== 'Tab') return;
  if(input.value && input.value.trim() !== '') return;
  event.preventDefault();
  _preencherHoraAtual(input);
  saveCorvuCampoDia(diaKey,idx,campo,input.value);
  _avancarFoco(input);
}
async function toggleBlock(p,id,dk) {
  let b=getBlocked(p,dk); b=b.includes(id)?b.filter(x=>x!==id):[...b,id]; await saveBlocked(p,b,dk); renderAll();
}
async function toggleCorvuBlock(p,idx) {
  let b=getCorvuBlocked(p); b=b.includes(idx)?b.filter(x=>x!==idx):[...b,idx];
  await salvarChave('blocked_corvu_'+p,JSON.stringify(b));
  _cache['blocked_corvu_'+p]=JSON.stringify(b);
  atualizarIndicadorPendentes();
  renderAll();
}

// ── BUILD ROTINA HTML ─────────────────────────────────────────────────
function buildRotinaHtml(r,p,dk,blocked,status,agora,temHora,badge) {
  const isBlocked=blocked.includes(r.id);
  const info=status[r.id]||{};
  const st=info.status||'';
  const minR=horaParaMin(r.hora);
  const isCurrent=minR>=0&&agora>=minR&&agora<minR+60;
  const dkk=dk||diaAtual;

  let cls='rotina-item';
  if(isBlocked)cls+=' blocked';
  else if(st==='erro')cls+=' erro';
  // done: encerrado E com horário de fim preenchido
  else if(st==='encerrado' && info.fim && info.fim.trim()!=='')cls+=' done';
  else if(st==='executando'||isCurrent)cls+=' current';
  // rotinas semStatus ficam escuras quando qualquer campo foi preenchido
  // se todosOsCampos:true, só fica verde quando TODOS os campos estiverem preenchidos
  else if(r.semStatus && (
    (r.campos && (
      r.todosOsCampos
        ? r.campos.every(c => info[c.k] && info[c.k].trim() !== '')
        : r.campos.some(c => info[c.k] && info[c.k].trim() !== '')
    )) ||
    (r.campo && info.campoval && info.campoval.trim() !== '')
  )) cls+=' done';

  let html=`<div class="${cls}" id="ri_${r.id}_${dkk}">
    <div class="rotina-time">${r.hora}</div>
    <div style="flex:1;min-width:0;">
      <div class="rotina-text">${r.texto}${badge?`<span class="badge-dia-anterior">Rotinas ${badge}</span>`:''}</div>
      ${r.obs?`<div class="rotina-obs">${r.obs}</div>`:''}
      ${r.caminho?`<div class="rotina-caminho">📂 ${r.caminho}</div>`:''}
      ${st==='erro'&&info.msg?`<div class="erro-msg-view">⚠️ ${info.msg}</div>`:''}
      ${st==='erro'&&info.chamado?`<div class="erro-msg-view" style="color:#ffb74d;">📋 Chamado: ${info.chamado}</div>`:''}
      ${st==='encerrado'&&info.chamado?`<div style="color:#1a7f37;font-size:0.82rem;font-weight:600;">📋 Chamado: ${info.chamado}</div>`:''}
    </div>
    <div class="rotina-actions">
      <div class="rotina-actions-row">
        ${r.semStatus ? '' : `<select class="status-select ${st}" ${isBlocked?'disabled':''} onchange="mudarStatus('${p}','${r.id}',this.value,'${dkk}')">
          <option value="" ${!st?'selected':''}>— Status —</option>
          <option value="executando" ${st==='executando'?'selected':''}>▶ Executando</option>
          <option value="encerrado"  ${st==='encerrado'?'selected':''}>✔ Encerrado</option>
          <option value="erro"       ${st==='erro'?'selected':''}>✖ Erro</option>
        </select>`}
        ${r.campo?`<input type="text" class="campo-extra" placeholder="${r.campo}" value="${info.campoval||''}" onblur="mudarCampo('${p}','${r.id}','campoval',this.value,'${dkk}')${r.semStatus?';renderAll()':''}">`:'' }
        ${!r.campos ? `<button class="btn-block ${isBlocked?'unblock':''}" onclick="toggleBlock('${p}','${r.id}','${dkk}')" title="${isBlocked?'Desbloquear':'Bloquear'}">${isBlocked?'🔓':'🔒'}</button>` : ''}
      </div>
      ${r.campos?`<div class="rotina-campos-wrap">
        ${r.campos.slice(0, -1).map(c=>`<div class="campo-label-wrap">
          <span class="campo-label">${c.label}:</span>
          <input type="text" class="campo-extra" placeholder="${c.label}" value="${info[c.k]||''}" onblur="mudarCampo('${p}','${r.id}','${c.k}',this.value,'${dkk}')${r.semStatus?';renderAll()':''}">
        </div>`).join('')}
        <div class="rotina-campos-ultima">
          <span class="campo-label">${r.campos[r.campos.length-1].label}:</span>
          <input type="text" class="campo-extra" placeholder="${r.campos[r.campos.length-1].label}" value="${info[r.campos[r.campos.length-1].k]||''}" onblur="mudarCampo('${p}','${r.id}','${r.campos[r.campos.length-1].k}',this.value,'${dkk}')${r.semStatus?';renderAll()':''}">
          <button class="btn-block ${isBlocked?'unblock':''}" onclick="toggleBlock('${p}','${r.id}','${dkk}')" title="${isBlocked?'Desbloquear':'Bloquear'}">${isBlocked?'🔓':'🔒'}</button>
        </div>
      </div>`:''}`;

  if(temHora && !r.semStatus) {
    const showI=(st==='executando'||st==='encerrado'||st==='erro');
    const showF=(st==='encerrado'||st==='erro');
    if(showI||showF) {
      html+=`<div class="rotina-actions-row hora-row" style="margin-top:3px;">`;
      if(showI) html+=`<span class="hora-label">Início</span><input type="time" class="hora-input" value="${info.inicio||''}" onblur="mudarCampoHora('${p}','${r.id}','inicio',this.value,'${dkk}')" onkeydown="autoHoraTab(event,this,'${p}','${r.id}','inicio','${dkk}')">`;
      if(showF) html+=`<span class="hora-label">Fim</span><input type="time" class="hora-input" value="${info.fim||''}" onblur="mudarCampoHora('${p}','${r.id}','fim',this.value,'${dkk}')" onkeydown="autoHoraTab(event,this,'${p}','${r.id}','fim','${dkk}')">`;
      html+=`</div>`;
    }
  }

  if(st==='erro') html+=`
    <textarea class="erro-desc" rows="2" placeholder="Descreva o erro..." style="margin-top:5px;" onblur="mudarCampo('${p}','${r.id}','msg',this.value,'${dkk}')">${info.msg||''}</textarea>
    <input type="text" class="chamado-input" placeholder="Nº do Chamado (ex: INC0012345)" value="${info.chamado||''}" onblur="mudarCampo('${p}','${r.id}','chamado',this.value,'${dkk}')">`;

  // Mostra o chamado mesmo apos encerrar (somente leitura, se houver chamado salvo)
  if(st==='encerrado' && info.chamado) html+=`
    <div class="chamado-encerrado">📋 Chamado: <strong>${info.chamado}</strong></div>`;

  html+=`</div></div>`;
  return html;
}

// ── RENDER ROTINAS ────────────────────────────────────────────────────
function renderRotinas(tabId,rotinas,p,dk) {
  const tab=document.getElementById('tab-'+tabId);
  if(!tab) return; // segurança: aba não existe no DOM
  const blocked=getBlocked(p,dk), status=getStatus(p,dk), agora=horaAtual();
  const temHora=(p==='diario'||p==='fds'||p==='mensal'||p==='anual');

  // Seções que devem ser renderizadas como tabela Corvu
  const secoesCorvu = new Set(['Corvu Sábado','Corvu Domingo']);

  let html=`<div class="movimento-header">${
    p==='mensal' ? getMovimentoHeaderMensal(dk) :
    p==='anual'  ? getMovimentoHeaderAnual(dk)  :
    getMovimentoHeader(dk)
  }</div>`;

  const secoes={};
  rotinas.forEach(r=>{ if(!secoes[r.secao])secoes[r.secao]=[]; secoes[r.secao].push(r); });

  Object.entries(secoes).forEach(([sec,items])=>{
    if(secoesCorvu.has(sec)) {
      // Renderiza como tabela Corvu inline
      const corvuPrefix = 'corvufds_' + sec.replace(/\s+/g,'_').toLowerCase();
      const dados = getCorvuDados(corvuPrefix);
      html+=`<div class="rotina-section"><h3>${sec}</h3>
        <div style="overflow-x:auto;">
        <table class="corvu-table"><thead><tr>
          <th>Rotina</th><th>Início</th><th>Fim</th><th>Servidor</th><th>Usuário</th><th>Terminal</th>
        </tr></thead><tbody>`;
      items.forEach((r,idx)=>{
        const d=dados[idx]||{};
        html+=`<tr>
          <td class="corvu-nome">${r.texto}</td>
          <td><input type="time" class="corvu-input" value="${d.inicio||''}" onblur="saveCorvuCampo('${corvuPrefix}',${idx},'inicio',this.value)" onkeydown="autoHoraTabCorvu(event,this,'${corvuPrefix}',${idx},'inicio')"></td>
          <td><input type="time" class="corvu-input" value="${d.fim||''}" onblur="saveCorvuCampo('${corvuPrefix}',${idx},'fim',this.value)" onkeydown="autoHoraTabCorvu(event,this,'${corvuPrefix}',${idx},'fim')"></td>
          <td><input type="text" class="corvu-input upper" placeholder="Servidor" value="${d.servidor||''}" oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampo('${corvuPrefix}',${idx},'servidor',this.value)"></td>
          <td><input type="text" class="corvu-input upper" placeholder="Usuário" value="${d.usuario||''}" oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampo('${corvuPrefix}',${idx},'usuario',this.value)"></td>
          <td><input type="text" class="corvu-input upper" placeholder="Terminal" value="${d.terminal||''}" oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampo('${corvuPrefix}',${idx},'terminal',this.value)"></td>
        </tr>`;
      });
      html+=`</tbody></table></div></div>`;
    } else {
      // Renderiza como rotinas normais
      html+=`<div class="rotina-section"><h3>${sec}</h3>`;
      items.forEach(r=>{ html+=buildRotinaHtml(r,p,dk,blocked,status,agora,temHora,null); });
      html+=`</div>`;
    }
  });
  tab.innerHTML=html;
}

// ── RENDER CORVU ──────────────────────────────────────────────────────
function renderCorvu(tabId,lista,p) {
  const tab = document.getElementById('tab-'+tabId) || document.getElementById(tabId);
  const dados=getCorvuDados(p);
  const comBloqueio=(p==='corvu'||p==='corvumensal');
  const blocked=comBloqueio?getCorvuBlocked(p):[];
  const isMenual=(p==='corvumensal');

  // Cabeçalho: Corvu Diário usa data atual, Corvu Mensal usa título mensal
  const cabecalho = isMenual
    ? getMovimentoHeaderCorvuMensal(diaAtual)
    : getMovimentoHeaderCorvu(diaAtual);

  let html=`<div class="movimento-header">${cabecalho}</div>`;

  // Aviso especial para o Corvu Mensal
  if(isMenual) {
    html+=`<div class="aviso-corvu-mensal">⚠️ Executar somente após atualizar a data mensal do IEPA</div>`;
  }

  html+=`<div style="overflow-x:auto;">
  <table class="corvu-table"><thead><tr>
    <th>Rotina</th>
    ${isMenual?'<th>Observação</th>':''}
    <th>Início</th><th>Fim</th><th>Servidor</th><th>Usuário</th><th>Terminal</th>
    ${comBloqueio?'<th style="width:40px;"></th>':''}
  </tr></thead><tbody>`;

  lista.forEach((item,idx)=>{
    const nome=typeof item==='string'?item:item.nome;
    const obs=typeof item==='object'&&item.obs?item.obs:'';
    const d=dados[idx]||{};
    const isB=blocked.includes(idx);
    html+=`<tr${isB?' class="corvu-bloqueada"':''}>
      <td class="corvu-nome">${nome}${isB?'<span class="badge-bloqueada">BLOQUEADA</span>':''}</td>
      ${isMenual?`<td class="corvu-obs-cell">${obs}</td>`:''}
      <td><input type="time" class="corvu-input" value="${d.inicio||''}" ${isB?'disabled':''} onblur="saveCorvuCampo('${p}',${idx},'inicio',this.value)" onkeydown="autoHoraTabCorvu(event,this,'${p}',${idx},'inicio')"></td>
      <td><input type="time" class="corvu-input" value="${d.fim||''}" ${isB?'disabled':''} onblur="saveCorvuCampo('${p}',${idx},'fim',this.value)" onkeydown="autoHoraTabCorvu(event,this,'${p}',${idx},'fim')"></td>
      <td><input type="text" class="corvu-input upper" placeholder="Servidor" value="${d.servidor||''}" ${isB?'disabled':''} oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampo('${p}',${idx},'servidor',this.value)"></td>
      <td><input type="text" class="corvu-input upper" placeholder="Usuário" value="${d.usuario||''}" ${isB?'disabled':''} oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampo('${p}',${idx},'usuario',this.value)"></td>
      <td><input type="text" class="corvu-input upper" placeholder="Terminal" value="${d.terminal||''}" ${isB?'disabled':''} oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampo('${p}',${idx},'terminal',this.value)"></td>
      ${comBloqueio?`<td><button class="btn-block ${isB?'unblock':''}" onclick="toggleCorvuBlock('${p}',${idx})">${isB?'🔓':'🔒'}</button></td>`:''}
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  tab.innerHTML=html;
}

// ── RENDER CORVU COM DATA (para abas dinâmicas do dia anterior) ───────
function renderCorvuDia(containerId, lista, diaKey) {
  const tab = document.getElementById('tab-' + containerId) || document.getElementById(containerId);

  const chaveCorvu = 'corvu_dados_corvu_' + diaKey;
  const chaveBlocked = 'blocked_corvu_dia_' + diaKey;
  let dados = {};
  let blocked = [];
  try { dados = JSON.parse(lerChave(chaveCorvu) || '{}'); } catch {}
  try { blocked = JSON.parse(lerChave(chaveBlocked) || '[]'); } catch {}

  let html = `<div style="overflow-x:auto;"><table class="corvu-table"><thead><tr>
    <th>Rotina</th><th>Início</th><th>Fim</th><th>Servidor</th><th>Usuário</th><th>Terminal</th><th style="width:40px;"></th>
  </tr></thead><tbody>`;

  lista.forEach((item, idx) => {
    const nome = typeof item === 'string' ? item : item.nome;
    const d = dados[idx] || {};
    const isB = blocked.includes(idx);
    html += `<tr${isB ? ' class="corvu-bloqueada"' : ''}>
      <td class="corvu-nome">${nome}${isB ? '<span class="badge-bloqueada">BLOQUEADA</span>' : ''}</td>
      <td><input type="time" class="corvu-input" value="${d.inicio||''}" ${isB?'disabled':''} onblur="saveCorvuCampoDia('${diaKey}',${idx},'inicio',this.value)" onkeydown="autoHoraTabCorvuDia(event,this,'${diaKey}',${idx},'inicio')"></td>
      <td><input type="time" class="corvu-input" value="${d.fim||''}" ${isB?'disabled':''} onblur="saveCorvuCampoDia('${diaKey}',${idx},'fim',this.value)" onkeydown="autoHoraTabCorvuDia(event,this,'${diaKey}',${idx},'fim')"></td>
      <td><input type="text" class="corvu-input upper" placeholder="Servidor" value="${d.servidor||''}" ${isB?'disabled':''} oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampoDia('${diaKey}',${idx},'servidor',this.value)"></td>
      <td><input type="text" class="corvu-input upper" placeholder="Usuário" value="${d.usuario||''}" ${isB?'disabled':''} oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampoDia('${diaKey}',${idx},'usuario',this.value)"></td>
      <td><input type="text" class="corvu-input upper" placeholder="Terminal" value="${d.terminal||''}" ${isB?'disabled':''} oninput="this.value=this.value.toUpperCase()" onblur="saveCorvuCampoDia('${diaKey}',${idx},'terminal',this.value)"></td>
      <td><button class="btn-block ${isB?'unblock':''}" onclick="toggleCorvuBlockDia('${diaKey}',${idx})">${isB?'🔓':'🔒'}</button></td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  tab.innerHTML = html;
}

async function toggleCorvuBlockDia(diaKey, idx) {
  const chave = 'blocked_corvu_dia_' + diaKey;
  let blocked = [];
  try { blocked = JSON.parse(lerChave(chave) || '[]'); } catch {}
  blocked = blocked.includes(idx) ? blocked.filter(x => x !== idx) : [...blocked, idx];
  await salvarChave(chave, JSON.stringify(blocked));
  _cache[chave] = JSON.stringify(blocked);
  atualizarIndicadorPendentes();
  renderAll();
}
